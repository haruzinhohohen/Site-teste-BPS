<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    
    <title>BIT PARTY EXPO - Cadastro</title>
</head>
    
<body>

    <header>
  <nav class="navbar">
     <div class="logo">
                <img src="img/logo.png" alt="Logo do site">
            </div>

    <ul class="nav-links">
      <li><a href="index.html">Sobre</a></li>
      <li><a href="cadastro.html">Cadastro</a></li>
    </ul>

    <a href="cadastro.html" class="btn-nav">Participar!</a>
  </nav>
</header>

    <h1>🎮 BIT PARTY EXPO</h1>
<p>Garanta seu lugar no maior evento gamer do Rio Grande do Sul!</p>

<div class="container">
<form>

    <label>Nome Completo</label>
    <input type="text" name="nome" required placeholder="Digite seu nome">

    <label>E-mail</label>
    <input type="email" name="email" required placeholder="Digite seu e-mail">

    <label>Telefone (opcional)</label>
    <input type="tel" name="telefone" placeholder="(00) 00000-0000">

    <label>Senha</label>
    <input type="password" name="senha" required placeholder="Crie uma senha">

    <label>Gênero</label>
    <div class="opcoes">
        <label><input type="radio" name="genero"> Masculino</label>
        <label><input type="radio" name="genero"> Feminino</label>
        <label><input type="radio" name="genero"> Outro</label>
    </div>

    <label>Interesses</label>
    <div class="opcoes">
        <label><input type="checkbox"> FPS</label>
        <label><input type="checkbox"> RPG</label>
        <label><input type="checkbox"> E-sports</label>
        <label><input type="checkbox"> Retrô</label>
    </div>

    <label>Área de Interesse</label>
    <select>
        <option>Selecione</option>
        <option>Música</option>
        <option>Esportes</option>
        <option>Tecnologia</option>
    </select>

    <div class="botoes">
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </div>

</form>
</div>

</body>

</html>
